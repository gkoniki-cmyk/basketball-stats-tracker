<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>バスケスタッツトラッカー</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="バスケスタッツ">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- ヘッダーエリア (スコア・タイマー) -->
    <header class="header">
        <div class="header-left">
            <button class="btn btn-outline" id="btn-timeout-a">タイムアウト</button>
            <div class="timeout-count">残り <span id="timeout-count-a">3</span></div>
        </div>
        
        <div class="header-center">
            <div class="quarter-selector">
                <span id="current-quarter">1Q</span>
                <span class="icon-updown">↕</span>
            </div>
            <div class="timer-area">
                <button class="btn-timer-adjust" id="btn-timer-minus">⊖</button>
                <div class="timer-display" id="timer-display">10:00</div>
                <button class="btn-timer-adjust" id="btn-timer-plus">⊕</button>
            </div>
            <div class="score-display">
                <span id="score-a" class="score">0</span>
                <span class="score-separator">-</span>
                <span id="score-b" class="score">0</span>
            </div>
        </div>

        <div class="header-right">
            <div class="btn-wrapper-right" style="display:flex; flex-direction:column; gap:8px; align-items:flex-end;">
                <div style="display: flex; gap: 5px;">
                    <button class="btn btn-outline" id="btn-settings" style="padding: 5px 10px; font-size: 13px;">⚙️ 設定</button>
                    <button class="btn btn-outline" id="btn-end-match" style="padding: 5px 10px; font-size: 13px; color: #d32f2f; border-color: #d32f2f;">⏹ 終了</button>
                </div>
                <button class="btn btn-outline" id="btn-timeout-b">タイムアウト</button>
            </div>
            <div class="timeout-count text-right">残り <span id="timeout-count-b">3</span></div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="main-content">
        <!-- チームA（左側） -->
        <section class="team-panel team-a" id="panel-team-a">
            <h2 contenteditable="true" class="team-name" id="team-name-a">チームA</h2>
            <div class="player-grid" id="player-grid-a">
                <!-- JavaScriptで生成 -->
            </div>
            <button class="btn btn-member-change" onclick="openSubModal('A')">メンバー<br>チェンジ</button>
        </section>

        <!-- アクションとログエリア（中央） -->
        <section class="center-panel" style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
            <div class="action-panel-top" style="display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%;">
                <div class="shot-types">
                    <button class="btn btn-action shot-btn" data-shot="ft">フリー<br>スロー</button>
                    <button class="btn btn-action shot-btn" data-shot="2p">2P</button>
                    <button class="btn btn-action shot-btn" data-shot="3p">3P</button>
                </div>
                <div class="shot-outcomes">
                    <button class="btn btn-action outcome-btn" data-outcome="success">成功</button>
                    <button class="btn btn-action outcome-btn" data-outcome="fail">失敗</button>
                </div>
            </div>

            <!-- 最近のプレイログ（スクロール可能リスト） -->
            <div class="play-log-container" style="width: 100%; flex-grow: 1; max-height: 200px; display: flex; flex-direction: column;">
                <div style="font-size: 13px; font-weight: bold; margin-bottom: 5px; color: var(--text-muted);">プレイログ</div>
                <div id="play-log-list" style="overflow-y: auto; flex-grow: 1; border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 5px; background: var(--surface-color);">
                    <!-- JavaScriptで複数行のログを生成 -->
                </div>
            </div>
        </section>

        <!-- チームB（右側） -->
        <section class="team-panel team-b" id="panel-team-b">
            <h2 contenteditable="true" class="team-name" id="team-name-b">チームB</h2>
            <div class="player-grid" id="player-grid-b">
                <!-- JavaScriptで生成 -->
            </div>
            <button class="btn btn-member-change" onclick="openSubModal('B')">メンバー<br>チェンジ</button>
        </section>
    </main>

    <!-- アクションエリア（下部） -->
    <section class="action-panel-bottom">
        <div class="action-grid">
            <button class="btn btn-action" data-action="foul">ファウル</button>
            <button class="btn btn-action" data-action="oreb">オフェンス<br>リバウンド</button>
            <button class="btn btn-action" data-action="to">ターン<br>オーバー</button>
            <button class="btn btn-action" data-action="blk">ブロック</button>
            
            <button class="btn btn-action" data-action="stl">スティール</button>
            <button class="btn btn-action" data-action="dreb">ディフェンス<br>リバウンド</button>
            <button class="btn btn-action" data-action="ast">アシスト</button>
            <button class="btn btn-action" id="btn-cancel-action">キャンセル</button>
        </div>
    </section>

    <div class="footer-actions">
        <button class="btn btn-primary" id="btn-export-csv" style="width: 100%; max-width: 400px; height: 50px;">CSVエクスポート</button>
    </div>

    <!-- メンバーチェンジ モーダル -->
    <div id="sub-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="sub-modal-title">メンバーチェンジ (チーム)</h3>
            
            <div class="sub-columns">
                <!-- コート上の選手 -->
                <div class="sub-column">
                    <h4>コート上 (OUT)</h4>
                    <div id="sub-list-court" class="sub-list">
                        <!-- JS generated -->
                    </div>
                </div>
                <!-- ベンチの選手 -->
                <div class="sub-column">
                    <h4>ベンチ (IN)</h4>
                    <div id="sub-list-bench" class="sub-list">
                        <!-- JS generated -->
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeSubModal()">キャンセル</button>
                <button class="btn btn-primary" id="btn-confirm-sub">交代を確定</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(registration => {
                    console.log('SW registered: ', registration.scope);
                }).catch(registrationError => {
                    console.log('SW registration failed: ', registrationError);
                });
            });
        }
    </script>
</body>
</html>

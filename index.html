<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>バスケスタッツトラッカー - トップ画面</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Settings specific styles */
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .settings-container {
            padding: 0 15px;
            overflow-y: auto;
            flex-grow: 1;
        }
        .team-settings {
            background-color: var(--surface-color);
            border-radius: var(--radius-md);
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
        }
        .team-settings h3 {
            margin-bottom: 15px;
            color: var(--primary-dark);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
            display: inline-block;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: bold;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 16px;
        }
        .player-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .player-row input[type="number"] {
            width: 70px;
        }
        .player-row input[type="text"] {
            flex-grow: 1;
        }
        .btn-remove-player {
            background-color: transparent;
            color: #d32f2f;
            border: 1px solid #d32f2f;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
        }
        .add-player-wrapper {
            margin-top: 10px;
            text-align: center;
        }
        .save-footer {
            padding: 15px;
            background-color: var(--surface-color);
            border-top: 1px solid var(--border-color);
            text-align: center;
        }
    </style>
</head>
<body>
    <header class="settings-header">
        <h2 style="margin: 0;">試合の準備</h2>
    </header>

    <main class="settings-container" id="settings-form">
        <!-- 試合設定 -->
        <section class="team-settings" id="game-settings-section">
            <h3>試合設定</h3>
            <div class="input-group">
                <label for="quarter-length">1クォーターの長さ (分)</label>
                <select id="quarter-length" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-size: 16px; background-color: white;">
                    <option value="5">5分 (ミニバス一部)</option>
                    <option value="6" selected>6分 (ミニバス標準)</option>
                    <option value="8">8分 (中学生)</option>
                    <option value="10">10分 (高校生・一般)</option>
                </select>
                <div style="font-size: 12px; color: var(--text-muted); margin-top: 5px;">
                    ※ 変更すると、新しいクォーター開始時のタイマーがこの分数に戻ります。<br>
                    ※ タイムアウトはクォーターごとに「1回」に設定されます。
                </div>
            </div>
        </section>

        <!-- JavaScript will inject team settings here -->
    </main>

    <footer class="save-footer">
        <button class="btn btn-primary btn-action" id="btn-resume-game" style="width: 100%; max-width: 400px; height: 50px; margin-bottom: 15px; display: none; background-color: var(--secondary-color);">▶ 中断している試合を再開する</button>
        <button class="btn btn-primary btn-action" id="btn-start-game" style="width: 100%; max-width: 400px; height: 50px;">新しく試合を始める</button>
    </footer>

    <script src="index.js"></script>
</body>
</html>
